<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ProcessLens AI™ — Interactive Business Process Discovery</title>
<script src="https://cdn.tailwindcss.com"></script>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{font-family:Inter,system-ui,sans-serif} body{background:#f8fafc;color:#0f172a}.soft{box-shadow:0 8px 30px rgba(15,23,42,.07)}
.hero{background:radial-gradient(circle at top left,#dbeafe 0,transparent 42%),radial-gradient(circle at top right,#ccfbf1 0,transparent 38%),#fff}
.fade{animation:fade .35s ease}@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.pulse{animation:pulse 1.5s infinite}@keyframes pulse{50%{opacity:.45}}
@media print{.no-print{display:none!important}body{background:#fff}.print-card{box-shadow:none!important;border:1px solid #ddd!important}}
</style>
</head>
<body><div id="root"></div>
<script type="text/babel">
const {useState,useMemo,useEffect}=React;
const industries=['Professional Services','Healthcare Office','Construction','Distribution','Property Management','Restaurant','Nonprofit','Retail','Other'];
const departments=['Operations','Sales','Marketing','Customer Service','Finance','HR','Administration','Procurement','Compliance'];
const tools=['Email','Spreadsheets','CRM','Accounting','Scheduling','Project Management','Paper Forms','Custom Software'];
const goals=['Save employee time','Reduce operating costs','Improve customer response','Reduce errors','Accelerate approvals','Improve reporting','Scale without hiring'];
const uid=()=>Math.random().toString(36).slice(2,9);
const money=n=>new Intl.NumberFormat('en-US',{style:'currency',currency:'USD',maximumFractionDigits:0}).format(n||0);

function Button({children,kind='primary',className='',...p}){const s={primary:'bg-gradient-to-r from-blue-600 to-teal-600 text-white',outline:'border border-blue-600 text-blue-700 bg-white',ghost:'bg-slate-100 text-slate-700',danger:'bg-red-600 text-white'};return <button className={`px-4 py-2.5 rounded-xl font-semibold text-sm transition hover:-translate-y-0.5 hover:shadow-md disabled:opacity-40 disabled:hover:translate-y-0 ${s[kind]} ${className}`} {...p}>{children}</button>}
function Card({children,className=''}){return <div className={`bg-white rounded-2xl border border-slate-200 soft p-5 ${className}`}>{children}</div>}
function Input({label,...p}){return <label className="block"><span className="text-sm font-medium text-slate-700">{label}</span><input className="mt-1.5 w-full rounded-xl border border-slate-300 px-3 py-2.5 outline-none focus:ring-2 focus:ring-blue-200 focus:border-blue-500" {...p}/></label>}
function Select({label,children,...p}){return <label className="block"><span className="text-sm font-medium text-slate-700">{label}</span><select className="mt-1.5 w-full rounded-xl border border-slate-300 px-3 py-2.5 bg-white outline-none focus:ring-2 focus:ring-blue-200" {...p}>{children}</select></label>}
function Pill({active,children,onClick}){return <button type="button" onClick={onClick} className={`px-3 py-2 rounded-xl border text-sm transition ${active?'bg-blue-600 border-blue-600 text-white':'bg-white border-slate-300 text-slate-600 hover:border-blue-400'}`}>{children}</button>}

const sample={business:{name:'BrightPath Property Services',industry:'Property Management',employees:22,hourly:32,challenge:'Manual intake, follow-up, and reporting'},goals:['Save employee time','Improve customer response','Reduce errors'],tools:['Email','Spreadsheets','Accounting','Scheduling'],workflows:[
{id:uid(),name:'Service Request Intake',department:'Operations',frequency:80,minutes:42,people:3,manual:90,error:70,delay:80,steps:['Request received','Details copied to spreadsheet','Manager review','Technician scheduled','Customer notified']},
{id:uid(),name:'Invoice Follow-up',department:'Finance',frequency:45,minutes:28,people:2,manual:85,error:55,delay:85,steps:['Invoice generated','Due date tracked','Reminder sent','Follow-up call','Payment recorded']},
{id:uid(),name:'Weekly Reporting',department:'Operations',frequency:4,minutes:180,people:1,manual:95,error:75,delay:65,steps:['Collect data','Clean spreadsheets','Calculate metrics','Manager review','Email report']}
]};

function analyze(data){
 const hourly=+data.business.hourly||30; const emp=+data.business.employees||5;
 const ops=data.workflows.map(w=>{const monthlyHours=(w.frequency*w.minutes*w.people)/60;const feasibility=Math.round((w.manual*.45)+(w.delay*.25)+(w.error*.2)+10);const impact=Math.min(100,Math.round(monthlyHours*1.5+w.delay*.25+w.error*.2));const recover=Math.round(monthlyHours*(Math.min(85,feasibility)/100)*.62);const savings=recover*hourly*12;const priority=Math.round(feasibility*.48+impact*.52);return {...w,monthlyHours,recover,savings,feasibility:Math.min(100,feasibility),impact,priority,recommendation:w.name.toLowerCase().includes('report')?'Reporting Automation':w.name.toLowerCase().includes('invoice')?'AI Follow-up Agent':w.name.toLowerCase().includes('intake')?'Intelligent Intake Assistant':'Workflow Automation Agent'};}).sort((a,b)=>b.priority-a.priority);
 const totalHours=ops.reduce((s,o)=>s+o.monthlyHours,0),recover=ops.reduce((s,o)=>s+o.recover,0),savings=ops.reduce((s,o)=>s+o.savings,0);
 const readiness=Math.min(96,Math.round(48+ops.length*5+(recover/(totalHours||1))*40+(data.tools.length>2?5:0)));
 return {ops,totalHours,recover,savings,readiness,risks:ops.filter(o=>o.delay>65||o.error>65).length,employees:emp};
}

function App(){
 const [view,setView]=useState('landing');
 const [data,setData]=useState(()=>{try{return JSON.parse(localStorage.getItem('processlensData'))||{business:{name:'',industry:'',employees:10,hourly:30,challenge:''},goals:[],tools:[],workflows:[]}}catch{return {business:{name:'',industry:'',employees:10,hourly:30,challenge:''},goals:[],tools:[],workflows:[]}}});
 const [step,setStep]=useState(0); const [editing,setEditing]=useState(null); const [analysis,setAnalysis]=useState(null); const [advisor,setAdvisor]=useState(false); const [messages,setMessages]=useState([{role:'ai',text:'Tell me which process consumes the most time. I will help you structure it.'}]); const [chat,setChat]=useState('');
 useEffect(()=>localStorage.setItem('processlensData',JSON.stringify(data)),[data]);
 const loadSample=()=>{setData(sample);setAnalysis(analyze(sample));setView('dashboard')};
 const runAnalysis=()=>{setView('analyzing');setTimeout(()=>{setAnalysis(analyze(data));setView('dashboard')},2200)};
 const reset=()=>{localStorage.removeItem('processlensData');setData({business:{name:'',industry:'',employees:10,hourly:30,challenge:''},goals:[],tools:[],workflows:[]});setAnalysis(null);setStep(0);setView('assessment')};
 const send=()=>{if(!chat.trim())return;const q=chat;setMessages(m=>[...m,{role:'user',text:q}]);setChat('');setTimeout(()=>{const low=q.toLowerCase();let a='A good next step is to document the trigger, the people involved, the systems used, and where waiting occurs.';if(low.includes('invoice'))a='Invoice follow-up is often a high-value candidate because reminders, status checks, and escalation rules can be automated while payment disputes remain human-controlled.';if(low.includes('intake'))a='For intake, map every channel where requests arrive, then identify duplicate entry and missing-information loops. Those usually create the fastest automation win.';if(low.includes('report'))a='Reporting automation should connect data sources, standardize calculations, flag anomalies, and keep final management approval.';setMessages(m=>[...m,{role:'ai',text:a}])},550)};
 const nav=view==='landing'?null:<Nav view={view} setView={setView} hasAnalysis={!!analysis} onReset={reset}/>;
 return <div>{nav}<main className={view==='landing'?'':'max-w-7xl mx-auto px-4 sm:px-6 py-7'}>{view==='landing'&&<Landing start={()=>setView('assessment')} sample={loadSample}/>} {view==='assessment'&&<Assessment data={data} setData={setData} step={step} setStep={setStep} run={runAnalysis} editing={editing} setEditing={setEditing}/>} {view==='analyzing'&&<Analyzing/>} {view==='dashboard'&&analysis&&<Dashboard data={data} analysis={analysis} setView={setView}/>} {view==='workflows'&&<Workflows data={data} setData={setData} editing={editing} setEditing={setEditing}/>} {view==='opportunities'&&analysis&&<Opportunities analysis={analysis}/>} {view==='report'&&analysis&&<Report data={data} analysis={analysis}/>}</main><button onClick={()=>setAdvisor(!advisor)} className="no-print fixed bottom-5 right-5 w-14 h-14 rounded-full bg-gradient-to-br from-blue-600 to-teal-600 text-white shadow-xl text-2xl">✦</button>{advisor&&<Advisor messages={messages} chat={chat} setChat={setChat} send={send} close={()=>setAdvisor(false)}/>}</div>
}

function Nav({view,setView,hasAnalysis,onReset}){return <header className="no-print sticky top-0 z-40 bg-white/95 backdrop-blur border-b"><div className="max-w-7xl mx-auto h-16 px-4 flex items-center gap-4"><button onClick={()=>setView(hasAnalysis?'dashboard':'assessment')} className="flex items-center gap-2 mr-auto"><span className="w-9 h-9 grid place-items-center rounded-xl bg-gradient-to-br from-blue-600 to-teal-600 text-white font-bold">PL</span><b>ProcessLens <span className="text-blue-600">AI™</span></b></button>{[['assessment','Assessment'],['workflows','Workflows'],['dashboard','Dashboard'],['opportunities','Opportunities'],['report','Report']].map(([id,l])=><button disabled={!hasAnalysis&&['dashboard','opportunities','report'].includes(id)} onClick={()=>setView(id)} className={`hidden md:block text-sm px-3 py-2 rounded-lg ${view===id?'bg-blue-50 text-blue-700 font-semibold':'text-slate-600 hover:bg-slate-50'} disabled:opacity-30`}>{l}</button>)}<Button kind="ghost" onClick={onReset}>New</Button></div></header>}

function Landing({start,sample}){return <div className="hero min-h-screen"><section className="max-w-7xl mx-auto px-5 py-20 lg:py-28 grid lg:grid-cols-2 gap-14 items-center"><div><span className="inline-flex rounded-full bg-teal-50 text-teal-700 border border-teal-200 px-4 py-1.5 text-sm font-semibold">AI-Powered Process Discovery</span><h1 className="mt-6 text-4xl sm:text-6xl font-extrabold leading-tight text-slate-900">See how your business really works—and <span className="text-transparent bg-clip-text bg-gradient-to-r from-blue-600 to-teal-600">what to automate first.</span></h1><p className="mt-6 text-lg text-slate-600 max-w-2xl">Map workflows, expose bottlenecks, estimate recoverable hours, and receive a prioritized automation roadmap.</p><div className="mt-8 flex flex-wrap gap-3"><Button onClick={start}>Start Interactive Assessment</Button><Button kind="outline" onClick={sample}>Explore Sample Company</Button></div><div className="mt-8 grid grid-cols-3 gap-4 text-center"><div><b className="text-2xl text-blue-700">5 min</b><p className="text-xs text-slate-500">guided discovery</p></div><div><b className="text-2xl text-teal-700">0–100</b><p className="text-xs text-slate-500">readiness score</p></div><div><b className="text-2xl text-emerald-700">30/90/180</b><p className="text-xs text-slate-500">day roadmap</p></div></div></div><Card className="p-6"><div className="flex justify-between"><div><p className="text-sm text-slate-500">Live opportunity preview</p><h3 className="font-bold text-xl">Customer Intake</h3></div><span className="bg-emerald-100 text-emerald-700 px-3 py-1 rounded-full text-xs font-semibold h-fit">Very High Fit</span></div><div className="mt-6 space-y-4">{[['Manual effort',88,'bg-amber-500'],['Delay exposure',74,'bg-red-500'],['Automation feasibility',91,'bg-blue-600']].map(x=><div><div className="flex justify-between text-sm"><span>{x[0]}</span><b>{x[1]}%</b></div><div className="h-2 bg-slate-100 rounded-full mt-1"><div className={`h-2 rounded-full ${x[2]}`} style={{width:x[1]+'%'}}/></div></div>)}</div><div className="mt-6 grid grid-cols-2 gap-3"><div className="rounded-xl bg-blue-50 p-4"><p className="text-xs text-slate-500">Hours recoverable</p><b className="text-2xl text-blue-700">42/mo</b></div><div className="rounded-xl bg-emerald-50 p-4"><p className="text-xs text-slate-500">Potential annual value</p><b className="text-2xl text-emerald-700">$16,128</b></div></div></Card></section><footer className="border-t bg-white py-6 text-center text-sm text-slate-500">ProcessLens AI™ — A NOFA AI Factory Innovation · We build AI that matters.</footer></div>}

function Assessment({data,setData,step,setStep,run,editing,setEditing}){const steps=['Business','Goals & Tools','Workflows','Review'];const valid=step===0?data.business.name&&data.business.industry:step===2?data.workflows.length>0:true;return <div className="max-w-5xl mx-auto fade"><div className="mb-7"><h1 className="text-3xl font-bold">Interactive Process Assessment</h1><p className="text-slate-500 mt-1">Your answers dynamically change the analysis.</p></div><div className="flex gap-2 mb-6">{steps.map((s,i)=><button onClick={()=>i<=step&&setStep(i)} className={`flex-1 rounded-xl px-3 py-3 text-sm font-semibold ${i===step?'bg-blue-600 text-white':i<step?'bg-teal-50 text-teal-700':'bg-white border text-slate-400'}`}>{i+1}. {s}</button>)}</div><Card>{step===0&&<BusinessStep data={data} setData={setData}/>} {step===1&&<GoalsStep data={data} setData={setData}/>} {step===2&&<WorkflowStep data={data} setData={setData} editing={editing} setEditing={setEditing}/>} {step===3&&<Review data={data}/>}<div className="mt-7 pt-5 border-t flex justify-between"><Button kind="ghost" disabled={step===0} onClick={()=>setStep(step-1)}>Back</Button>{step<3?<Button disabled={!valid} onClick={()=>setStep(step+1)}>Continue</Button>:<Button disabled={!data.workflows.length} onClick={run}>Analyze My Business</Button>}</div></Card></div>}
function BusinessStep({data,setData}){const b=data.business,u=(k,v)=>setData({...data,business:{...b,[k]:v}});return <div className="grid md:grid-cols-2 gap-5"><Input label="Business name" value={b.name} onChange={e=>u('name',e.target.value)} placeholder="Example Company"/><Select label="Industry" value={b.industry} onChange={e=>u('industry',e.target.value)}><option value="">Select industry</option>{industries.map(x=><option>{x}</option>)}</Select><Input label="Number of employees" type="number" min="1" value={b.employees} onChange={e=>u('employees',e.target.value)}/><Input label="Average hourly labor cost" type="number" min="1" value={b.hourly} onChange={e=>u('hourly',e.target.value)}/><label className="md:col-span-2"><span className="text-sm font-medium">Main operational challenge</span><textarea className="mt-1.5 w-full min-h-28 rounded-xl border px-3 py-2.5" value={b.challenge} onChange={e=>u('challenge',e.target.value)} placeholder="Where does work slow down or get repeated?"/></label></div>}
function GoalsStep({data,setData}){const toggle=(key,val)=>setData({...data,[key]:data[key].includes(val)?data[key].filter(x=>x!==val):[...data[key],val]});return <div><h3 className="font-bold text-lg">What do you want to improve?</h3><div className="flex flex-wrap gap-2 mt-3">{goals.map(x=><Pill active={data.goals.includes(x)} onClick={()=>toggle('goals',x)}>{x}</Pill>)}</div><h3 className="font-bold text-lg mt-7">Which tools are used today?</h3><div className="flex flex-wrap gap-2 mt-3">{tools.map(x=><Pill active={data.tools.includes(x)} onClick={()=>toggle('tools',x)}>{x}</Pill>)}</div></div>}
function WorkflowStep({data,setData,editing,setEditing}){const blank={id:null,name:'',department:'Operations',frequency:20,minutes:30,people:1,manual:70,error:40,delay:50,steps:['Request received','Work performed','Result delivered']};const [f,setF]=useState(blank);useEffect(()=>{if(editing){const w=data.workflows.find(x=>x.id===editing);if(w)setF(w)}},[editing]);const save=()=>{if(!f.name)return;const x={...f,id:f.id||uid()};setData({...data,workflows:f.id?data.workflows.map(w=>w.id===f.id?x:w):[...data.workflows,x]});setF(blank);setEditing(null)};return <div className="grid lg:grid-cols-5 gap-6"><div className="lg:col-span-3 space-y-4"><div className="grid sm:grid-cols-2 gap-4"><Input label="Workflow name" value={f.name} onChange={e=>setF({...f,name:e.target.value})} placeholder="New customer intake"/><Select label="Department" value={f.department} onChange={e=>setF({...f,department:e.target.value})}>{departments.map(x=><option>{x}</option>)}</Select><Input label="Times completed per month" type="number" value={f.frequency} onChange={e=>setF({...f,frequency:+e.target.value})}/><Input label="Minutes per completion" type="number" value={f.minutes} onChange={e=>setF({...f,minutes:+e.target.value})}/><Input label="People involved" type="number" value={f.people} onChange={e=>setF({...f,people:+e.target.value})}/></div>{[['Manual effort','manual'],['Error exposure','error'],['Delay exposure','delay']].map(([l,k])=><label className="block"><div className="flex justify-between text-sm"><span>{l}</span><b>{f[k]}%</b></div><input className="w-full accent-blue-600" type="range" min="0" max="100" value={f[k]} onChange={e=>setF({...f,[k]:+e.target.value})}/></label>)}<label className="block"><span className="text-sm font-medium">Workflow steps (one per line)</span><textarea className="mt-1.5 w-full min-h-28 rounded-xl border px-3 py-2.5" value={f.steps.join('\n')} onChange={e=>setF({...f,steps:e.target.value.split('\n').filter(Boolean)})}/></label><Button onClick={save}>{f.id?'Update Workflow':'Add Workflow'}</Button></div><div className="lg:col-span-2"><h4 className="font-bold mb-3">Added workflows ({data.workflows.length})</h4><div className="space-y-3 max-h-[520px] overflow-auto">{data.workflows.map(w=><div className="border rounded-xl p-3 bg-slate-50"><div className="flex justify-between"><div><b className="text-sm">{w.name}</b><p className="text-xs text-slate-500">{w.department} · {w.frequency}x/mo</p></div><button onClick={()=>{setEditing(w.id);setF(w)}} className="text-blue-600 text-xs">Edit</button></div><div className="mt-2 text-xs text-slate-500">{Math.round(w.frequency*w.minutes*w.people/60)} labor hrs/month</div></div>)}{!data.workflows.length&&<p className="text-sm text-slate-400 border border-dashed rounded-xl p-5 text-center">Add at least one workflow.</p>}</div></div></div>}
function Review({data}){return <div><h3 className="text-xl font-bold">Ready to analyze {data.business.name}</h3><div className="grid sm:grid-cols-3 gap-4 mt-5"><div className="bg-blue-50 rounded-xl p-4"><p className="text-xs text-slate-500">Workflows</p><b className="text-2xl text-blue-700">{data.workflows.length}</b></div><div className="bg-teal-50 rounded-xl p-4"><p className="text-xs text-slate-500">Current tools</p><b className="text-2xl text-teal-700">{data.tools.length}</b></div><div className="bg-emerald-50 rounded-xl p-4"><p className="text-xs text-slate-500">Goals</p><b className="text-2xl text-emerald-700">{data.goals.length}</b></div></div><div className="mt-5 space-y-2">{data.workflows.map(w=><div className="flex justify-between border rounded-xl p-3"><span>{w.name}</span><span className="text-sm text-slate-500">{Math.round(w.frequency*w.minutes*w.people/60)} hrs/mo</span></div>)}</div><p className="mt-5 text-xs text-slate-500">Estimates are preliminary and should be validated before operational or financial decisions.</p></div>}
function Analyzing(){const items=['Mapping workflow burden','Detecting bottlenecks','Scoring automation feasibility','Estimating recoverable capacity','Building implementation roadmap'];const [n,setN]=useState(0);useEffect(()=>{const t=setInterval(()=>setN(x=>Math.min(items.length-1,x+1)),390);return()=>clearInterval(t)},[]);return <div className="max-w-xl mx-auto py-20"><Card className="text-center"><div className="w-16 h-16 mx-auto rounded-full bg-blue-100 grid place-items-center text-2xl pulse">✦</div><h2 className="text-2xl font-bold mt-4">Analyzing your business</h2><div className="mt-6 space-y-3 text-left">{items.map((x,i)=><div className={`flex gap-3 p-3 rounded-xl ${i<=n?'bg-blue-50 text-blue-800':'bg-slate-50 text-slate-400'}`}><span>{i<n?'✓':i===n?'●':'○'}</span>{x}</div>)}</div></Card></div>}
function Dashboard({data,analysis,setView}){return <div className="fade space-y-6"><div className="flex flex-wrap justify-between gap-3"><div><h1 className="text-3xl font-bold">{data.business.name} Automation Dashboard</h1><p className="text-slate-500">Live results from {data.workflows.length} mapped workflows.</p></div><Button onClick={()=>setView('opportunities')}>View Priorities</Button></div><div className="grid sm:grid-cols-2 lg:grid-cols-4 gap-4">{[['Readiness',analysis.readiness+'/100','blue'],['Hours recoverable',Math.round(analysis.recover)+'/mo','teal'],['Potential annual value',money(analysis.savings),'emerald'],['High-risk workflows',analysis.risks,'amber']].map(([a,b,c])=><Card><p className="text-sm text-slate-500">{a}</p><b className={`text-3xl text-${c}-700`}>{b}</b></Card>)}</div><div className="grid lg:grid-cols-3 gap-5"><Card className="lg:col-span-2"><h3 className="font-bold">Opportunity ranking</h3><div className="mt-4 space-y-4">{analysis.ops.map((o,i)=><div><div className="flex justify-between text-sm"><span><b>#{i+1}</b> {o.name}</span><b>{o.priority}/100</b></div><div className="h-3 bg-slate-100 rounded-full mt-1"><div className="h-3 bg-gradient-to-r from-blue-600 to-teal-500 rounded-full" style={{width:o.priority+'%'}}/></div><div className="flex gap-4 text-xs text-slate-500 mt-1"><span>{o.recover} hrs/mo recoverable</span><span>{money(o.savings)}/yr</span></div></div>)}</div></Card><Card><h3 className="font-bold">Recommended first move</h3>{analysis.ops[0]&&<div className="mt-4"><span className="inline-flex bg-emerald-100 text-emerald-700 rounded-full px-3 py-1 text-xs font-semibold">Highest priority</span><h4 className="text-xl font-bold mt-3">{analysis.ops[0].recommendation}</h4><p className="text-sm text-slate-500 mt-2">Apply it to <b>{analysis.ops[0].name}</b> while retaining human review for exceptions.</p><div className="mt-5 grid grid-cols-2 gap-2"><div className="bg-blue-50 rounded-xl p-3"><p className="text-xs">Feasibility</p><b>{analysis.ops[0].feasibility}%</b></div><div className="bg-teal-50 rounded-xl p-3"><p className="text-xs">Impact</p><b>{analysis.ops[0].impact}%</b></div></div></div>}</Card></div><Card><h3 className="font-bold">30 / 90 / 180-day roadmap</h3><div className="grid md:grid-cols-3 gap-4 mt-4">{[['0–30 days','Standardize data capture and automate the top repetitive step.'],['30–90 days','Connect existing tools and introduce approval rules.'],['90–180 days','Add monitoring, predictive alerts, and executive reporting.']].map(x=><div className="border rounded-xl p-4"><b className="text-blue-700">{x[0]}</b><p className="text-sm text-slate-600 mt-2">{x[1]}</p></div>)}</div></Card></div>}
function Workflows({data,setData}){return <div><h1 className="text-3xl font-bold">Workflow Library</h1><p className="text-slate-500 mb-6">Edit or remove mapped processes, then rerun the assessment.</p><div className="grid lg:grid-cols-2 gap-5">{data.workflows.map(w=><Card><div className="flex justify-between"><div><h3 className="font-bold text-lg">{w.name}</h3><p className="text-sm text-slate-500">{w.department}</p></div><button className="text-red-600 text-sm" onClick={()=>setData({...data,workflows:data.workflows.filter(x=>x.id!==w.id)})}>Remove</button></div><div className="mt-4 flex gap-2 overflow-x-auto">{w.steps.map((s,i)=><React.Fragment key={s}><span className="min-w-fit px-3 py-2 rounded-lg bg-blue-50 text-blue-800 text-xs">{s}</span>{i<w.steps.length-1&&<span className="self-center text-slate-300">→</span>}</React.Fragment>)}</div><div className="grid grid-cols-3 gap-2 mt-4 text-center text-xs"><div className="bg-slate-50 rounded-lg p-2"><b>{w.manual}%</b><p>manual</p></div><div className="bg-slate-50 rounded-lg p-2"><b>{w.error}%</b><p>error exposure</p></div><div className="bg-slate-50 rounded-lg p-2"><b>{w.delay}%</b><p>delay exposure</p></div></div></Card>)}</div></div>}
function Opportunities({analysis}){const [sel,setSel]=useState(analysis.ops[0]);return <div className="grid lg:grid-cols-5 gap-5"><div className="lg:col-span-2"><h1 className="text-3xl font-bold">Automation Opportunities</h1><p className="text-slate-500 mb-5">Select an opportunity to inspect it.</p><div className="space-y-3">{analysis.ops.map(o=><button onClick={()=>setSel(o)} className={`w-full text-left border rounded-xl p-4 ${sel.id===o.id?'border-blue-500 bg-blue-50':'bg-white'}`}><div className="flex justify-between"><b>{o.name}</b><span>{o.priority}</span></div><p className="text-xs text-slate-500 mt-1">{o.recommendation}</p></button>)}</div></div><Card className="lg:col-span-3 h-fit"><span className="text-xs font-semibold text-blue-700 bg-blue-100 rounded-full px-3 py-1">Priority {sel.priority}/100</span><h2 className="text-2xl font-bold mt-3">{sel.name}</h2><p className="text-slate-500">Recommended: {sel.recommendation}</p><div className="grid sm:grid-cols-2 gap-4 mt-6">{[['Current labor burden',Math.round(sel.monthlyHours)+' hrs/mo'],['Recoverable capacity',sel.recover+' hrs/mo'],['Potential annual value',money(sel.savings)],['Automation feasibility',sel.feasibility+'%']].map(x=><div className="rounded-xl bg-slate-50 p-4"><p className="text-xs text-slate-500">{x[0]}</p><b className="text-xl">{x[1]}</b></div>)}</div><h3 className="font-bold mt-6">Recommended future workflow</h3><div className="mt-3 space-y-2">{['Capture information once','Validate required fields automatically','Route routine cases without delay','Escalate exceptions to a human','Record outcome and notify stakeholders'].map((x,i)=><div className="flex gap-3 p-3 border rounded-xl"><span className="w-6 h-6 rounded-full bg-teal-100 text-teal-700 grid place-items-center text-xs font-bold">{i+1}</span><span className="text-sm">{x}</span></div>)}</div><div className="mt-6 bg-amber-50 border border-amber-200 rounded-xl p-4 text-sm"><b>Human oversight:</b> Keep approvals, disputed cases, sensitive decisions, and policy exceptions under human control.</div></Card></div>}
function Report({data,analysis}){return <div className="max-w-4xl mx-auto"><div className="no-print flex justify-between mb-5"><div><h1 className="text-3xl font-bold">Automation Readiness Report</h1><p className="text-slate-500">Printable and presentation-ready.</p></div><Button onClick={()=>window.print()}>Print / Save PDF</Button></div><Card className="print-card"><div className="border-b pb-5"><p className="text-sm text-blue-700 font-semibold">PROCESSLENS AI™</p><h1 className="text-3xl font-bold mt-1">Automation Readiness Report</h1><p className="text-slate-500">Prepared for {data.business.name} · {new Date().toLocaleDateString()}</p></div><section className="py-5"><h2 className="text-xl font-bold">Executive Summary</h2><p className="mt-2 text-slate-600">ProcessLens reviewed {data.workflows.length} workflows and identified approximately {Math.round(analysis.recover)} recoverable labor hours per month, representing up to {money(analysis.savings)} in estimated annual capacity value.</p></section><div className="grid grid-cols-3 gap-3"><div className="bg-blue-50 p-4 rounded-xl"><p className="text-xs">Readiness</p><b className="text-2xl">{analysis.readiness}/100</b></div><div className="bg-teal-50 p-4 rounded-xl"><p className="text-xs">Hours/month</p><b className="text-2xl">{Math.round(analysis.recover)}</b></div><div className="bg-emerald-50 p-4 rounded-xl"><p className="text-xs">Annual value</p><b className="text-2xl">{money(analysis.savings)}</b></div></div><section className="py-5"><h2 className="text-xl font-bold">Priority Opportunities</h2><div className="mt-3 space-y-3">{analysis.ops.map((o,i)=><div className="border rounded-xl p-4"><div className="flex justify-between"><b>{i+1}. {o.name}</b><span>Priority {o.priority}</span></div><p className="text-sm text-slate-600 mt-1">{o.recommendation} · {o.recover} hrs/month recoverable · {money(o.savings)} annual potential value.</p></div>)}</div></section><section><h2 className="text-xl font-bold">Implementation Roadmap</h2><ol className="list-decimal pl-5 mt-3 space-y-2 text-slate-600"><li>Validate baseline task volumes and labor assumptions.</li><li>Prototype the highest-priority workflow with human approval controls.</li><li>Measure cycle time, error rate, adoption, and customer impact.</li><li>Connect systems only after the workflow proves value.</li></ol></section><p className="mt-7 text-xs text-slate-500 border-t pt-4">Preliminary estimates based on user-provided information. Validate before financial, staffing, legal, or operational decisions. ProcessLens AI™ — A NOFA AI Factory Innovation.</p></Card></div>}
function Advisor({messages,chat,setChat,send,close}){return <div className="no-print fixed right-5 bottom-24 w-[360px] max-w-[calc(100vw-40px)] bg-white border rounded-2xl shadow-2xl z-50 overflow-hidden"><div className="p-4 bg-gradient-to-r from-blue-600 to-teal-600 text-white flex justify-between"><div><b>ProcessLens Advisor</b><p className="text-xs text-white/80">Workflow discovery assistant</p></div><button onClick={close}>✕</button></div><div className="h-80 overflow-auto p-4 space-y-3 bg-slate-50">{messages.map(m=><div className={`max-w-[85%] rounded-2xl px-3 py-2 text-sm ${m.role==='user'?'ml-auto bg-blue-600 text-white':'bg-white border text-slate-700'}`}>{m.text}</div>)}</div><div className="p-3 flex gap-2 border-t"><input onKeyDown={e=>e.key==='Enter'&&send()} value={chat} onChange={e=>setChat(e.target.value)} placeholder="Ask about a workflow…" className="flex-1 border rounded-xl px-3 py-2 text-sm"/><Button onClick={send}>Send</Button></div></div>}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script></body></html>
